name: Pipeline

# Calls the reusable C++ app PR workflow in DSS.DevOps.
# See: https://github.com/dailysoftwaresystems/DSS.DevOps/blob/v2/.github/workflows/cpp-app-pr.yml

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Reusable workflows inherit the caller's GITHUB_TOKEN scope. Without
# `statuses: write` granted here, the rollup `ci-check` job inside the
# reusable can't post the "Pipeline / ci-check result" commit status,
# which leaves branch protection stuck in "Expected — Waiting" forever.
permissions:
  contents: read
  pull-requests: read
  security-events: write
  statuses: write

jobs:
  pipeline-pr:
    uses: dailysoftwaresystems/DSS.DevOps/.github/workflows/cpp-app-pr.yml@v2
    with:
      cmake-version: "latest"
      # Apple Clang lags upstream on C++23 stdlib; the reusable workflow
      # installs Homebrew LLVM on macos-latest to recover C++23 coverage.
      # See .plans/03-substrate-hardening-plan - ok.md SH2.
      run-macos: true
      # v0.0.2 V2-1 (D-LK10-ENTRY-ARM64): opt into the reusable workflow's
      # optional NATIVE arm64 Linux leg (ubuntu-24.04-arm) so CI builds the
      # compiler on arm64 AND runs its emitted AArch64 binaries. The compiler
      # is a cross-compiler; on the native arm64 runner the `arm64_exit` corpus
      # runs its ELF DIRECTLY (host arch == target arch → no emulator). The
      # harness's qemu-aarch64 path is only for running aarch64 binaries on an
      # x86_64 host (e.g. local dev) — CI does not use QEMU. Native arm64
      # execution-verifies the whole ARM64 backend end-to-end.
      run-linux-arm64: true
      # The Windows/MSVC PCH is not byte-reproducible (a memory image with
      # ASLR/GC-randomized embedded addresses), so a freshly-built PCH each run
      # busts ccache — the PCH is hashed into every dependent TU's key, leaving
      # the windows-msvc leg at ~7% hits / ~40 min every run while Linux GCC
      # (reproducible .gch) sits at ~99.7%. Opt that ONE leg into the reusable
      # workflow's PCH-binary cache: it caches + restores the byte-identical PCH
      # across runs so the key stays stable -> warm runs hit, with PCH still ON
      # for fast cold builds (no D-CI-WINDOWS-MSVC-BUILD-TIME-CEILING regression).
      # macOS already hits via the committed -Xclang -fno-pch-timestamp fix, so
      # only the MSVC leg is listed.
      cache-pch-on: "windows-msvc-release"
    secrets:
      DSS_BOTS_CLIENT_ID: ${{ secrets.DSS_BOTS_CLIENT_ID }}
      DSS_BOTS_APP_PRIVATE_KEY: ${{ secrets.DSS_BOTS_APP_PRIVATE_KEY }}

  # Catches the recurring "missing commit hash in landing log" bug class
  # by regenerating the hash anchors from `git log` and failing if they
  # drift from what's checked in. See .plans/03-substrate-hardening-plan - ok.md
  # SH1 (the tool) and SH4a (this job). Intentionally ungated by the
  # `Run Pipes` label — plan-doc hygiene matters on every PR.
  landing-log-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `tools/refresh_landing_log.py` shells `git log` to find PR
          # commits; shallow clones return only HEAD and silently miss
          # every prior landing, producing a false drift signal.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python tools/test_refresh_landing_log.py

      - name: Check landing-log hash anchors
        run: python tools/refresh_landing_log.py --check
